version: '3.8'

# Haude V2 - Full Stack Docker Compose
# Run: docker-compose up -d

services:
  # PostgreSQL database
  postgres:
    image: postgres:15-alpine
    container_name: haude-v2-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: haude_v2
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Backend API (NestJS)
  backend:
    build: ./haude-v2-backend
    container_name: haude-v2-backend
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/haude_v2?schema=public
      - JWT_SECRET=${JWT_SECRET:-your-secret-key-change-in-production}
      - JWT_EXPIRES_IN=7d
      - PORT=3001
      - FRONTEND_URL=http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # Frontend (React + Vite)
  frontend:
    build: ./haude-v2-frontend
    container_name: haude-v2-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
