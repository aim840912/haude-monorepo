# ==============================================================================
# Haude Monorepo - Docker Compose
# ==============================================================================
# 使用方式：
#   docker-compose up -d postgres      # 只啟動資料庫（本地開發推薦）
#   docker-compose up -d               # 啟動所有服務
#   docker-compose up --build          # 重新建置並啟動
#   docker-compose down                # 停止所有服務
#   docker-compose logs -f api         # 查看 API 日誌
# ==============================================================================

services:
  # ----------------------------------------------------------------------------
  # PostgreSQL 資料庫
  # ----------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: haude-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: haude_v2
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------------------------
  # NestJS 後端 API
  # ----------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: haude-api
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/haude_v2
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-in-production}
      - JWT_EXPIRES_IN=7d
      - PORT=3001
      - FRONTEND_URL=http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ----------------------------------------------------------------------------
  # Next.js 用戶端前端
  # ----------------------------------------------------------------------------
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: haude-web
    ports:
      - "5173:3000"
    environment:
      # 只設定 Base URL，版本在 api.ts 中集中管理
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:3001
    depends_on:
      - api
    restart: unless-stopped

  # ----------------------------------------------------------------------------
  # Vite 管理後台
  # ----------------------------------------------------------------------------
  admin:
    build:
      context: .
      dockerfile: Dockerfile.admin
    container_name: haude-admin
    ports:
      - "5174:80"
    environment:
      # 只設定 Base URL，版本在 client.ts 中集中管理
      - VITE_API_BASE_URL=http://localhost:3001
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
